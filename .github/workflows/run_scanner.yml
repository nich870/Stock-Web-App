name: Daily AlgoScanner Automator

on:
  schedule:
    # Cron syntax coordinates to execute precisely twice a day
    - cron: '30 20 * * 1-5' # 1. Runs Monday-Friday at 4:30 PM EST (Post-market close)
    - cron: '0 14 * * 1-5' # 2. Runs Monday-Friday at 10:00 AM EST (Morning confirmation check)
  workflow_dispatch: # Allows you to click a button on GitHub to test run manually anytime

jobs:
  run-scanner-logic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo Code Matrix
        uses: actions/checkout@v4
        
      - name: Mount Python Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Inject Core Machine Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance numpy
          
      - name: Execute Background Data Scan
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python automation.py